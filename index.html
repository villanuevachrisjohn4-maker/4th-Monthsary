<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Favorite Nonchalant Person <3</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to top, #fff5f8, #ffffff);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
    text-align: center;
}

h1 {
    font-size: 2rem;
    margin-bottom: 10px;
}

/* Flower GIF */
.flower {
    width: 220px;
    max-width: 80vw;
    height: auto;
    animation: float 4s ease-in-out infinite;
    z-index: 2;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

/* Typing Message */
.message {
    margin-top: 20px;
    font-size: 1.2rem;
    min-height: 24px;
    border-right: 2px solid pink;
    white-space: nowrap;
    overflow: hidden;
    animation: blink 0.7s infinite;
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* Floating Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    color: pink;
    animation: floatUp linear forwards;
    opacity: 0.8;
    z-index: 1;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

/* Music Button */
.music-btn {
    margin-top: 20px;
    padding: 8px 15px;
    background: pink;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9rem;
}

.music-btn:hover {
    background: hotpink;
    color: white;
}

/* Mobile adjustments */
@media (max-width: 600px) {
    h1 {
        font-size: 1.5rem;
    }

    .flower {
        width: 160px;
    }

    .message {
        font-size: 1rem;
    }
}
</style>
</head>
<body>

<h1>For Gelie &lt;3</h1>

<!-- Your GIF -->
<img src="flower.gif" class="flower" alt="Flower">

<div class="message" id="typing"></div>

<button class="music-btn" onclick="playMusic()">Tap to Play Music 🎵</button>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* Typing Animation */
const text = "Everything I ever wanted in a flower is here 🌼";
const typingElement = document.getElementById("typing");
let index = 0;

function type() {
    if (index < text.length) {
        typingElement.innerHTML += text.charAt(index);
        index++;
        setTimeout(type, 50);
    }
}
setTimeout(type, 1000);


/* Floating Hearts Generator */
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);
}
setInterval(createHeart, 700);


/* Music Play */
function playMusic() {
    const music = document.getElementById("bgMusic");
    music.play();
}

</script>

</body>
</html>
